<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$PEPE - The Green King of Memes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2em;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88; }
            50% { text-shadow: 0 0 30px #00ff88, 0 0 50px #00ff88; }
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            padding-top: 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,255,136,0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 5em;
            margin-bottom: 20px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hero p {
            font-size: 1.8em;
            margin-bottom: 40px;
            color: #fff;
            animation: slideUp 1s ease-out 0.3s backwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .pepe-emoji {
            font-size: 8em;
            display: block;
            margin: 20px 0;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.6s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6f 100%);
            color: #0a0e27;
            box-shadow: 0 5px 20px rgba(0,255,136,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.6);
        }

        .btn-secondary {
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
        }

        .btn-secondary:hover {
            background: #00ff88;
            color: #0a0e27;
            transform: translateY(-5px);
        }

        section {
            padding: 100px 0;
            position: relative;
        }

        h2 {
            font-size: 3em;
            text-align: center;
            margin-bottom: 60px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .tokenomics {
            background: rgba(255,255,255,0.02);
        }

        .tokenomics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .token-card {
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,255,136,0.05) 100%);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(0,255,136,0.3);
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .token-card:nth-child(1) { animation-delay: 0.1s; }
        .token-card:nth-child(2) { animation-delay: 0.2s; }
        .token-card:nth-child(3) { animation-delay: 0.3s; }
        .token-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .token-card:hover {
            transform: translateY(-10px);
            border-color: #00ff88;
            box-shadow: 0 10px 40px rgba(0,255,136,0.3);
        }

        .token-card h3 {
            font-size: 1.5em;
            color: #00ff88;
            margin-bottom: 15px;
        }

        .token-card p {
            font-size: 2em;
            font-weight: bold;
        }

        .roadmap {
            background: rgba(0,0,0,0.2);
        }

        .roadmap-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .roadmap-item {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
            animation: fadeInLeft 0.8s ease-out backwards;
        }

        .roadmap-item:nth-child(1) { animation-delay: 0.1s; }
        .roadmap-item:nth-child(2) { animation-delay: 0.2s; }
        .roadmap-item:nth-child(3) { animation-delay: 0.3s; }
        .roadmap-item:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .roadmap-number {
            font-size: 3em;
            font-weight: bold;
            color: #00ff88;
            min-width: 80px;
            text-align: center;
        }

        .roadmap-content {
            flex: 1;
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,255,136,0.05) 100%);
            padding: 30px;
            border-radius: 15px;
            border-left: 4px solid #00ff88;
        }

        .roadmap-content h3 {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #00ff88;
        }

        .how-to-buy {
            background: rgba(255,255,255,0.02);
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .step {
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,255,136,0.05) 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(0,255,136,0.3);
            transition: all 0.3s ease;
            animation: zoomIn 0.6s ease-out backwards;
        }

        .step:nth-child(1) { animation-delay: 0.1s; }
        .step:nth-child(2) { animation-delay: 0.2s; }
        .step:nth-child(3) { animation-delay: 0.3s; }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .step:hover {
            transform: scale(1.05);
            border-color: #00ff88;
        }

        .step-number {
            font-size: 3em;
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .step h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #fff;
        }

        .community {
            background: rgba(0,0,0,0.2);
            text-align: center;
        }

        .social-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .social-btn {
            padding: 20px 50px;
            font-size: 1.3em;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .telegram {
            background: linear-gradient(135deg, #0088cc 0%, #006699 100%);
            color: #fff;
            box-shadow: 0 5px 20px rgba(0,136,204,0.4);
        }

        .telegram:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,136,204,0.6);
        }

        .twitter {
            background: linear-gradient(135deg, #1DA1F2 0%, #0d8bd9 100%);
            color: #fff;
            box-shadow: 0 5px 20px rgba(29,161,242,0.4);
        }

        .twitter:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(29,161,242,0.6);
        }

        footer {
            background: rgba(0,0,0,0.5);
            padding: 40px 0;
            text-align: center;
        }

        footer p {
            font-size: 1.2em;
            color: #888;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 3em;
            }
            
            .hero p {
                font-size: 1.3em;
            }
            
            .pepe-emoji {
                font-size: 5em;
            }
            
            h2 {
                font-size: 2em;
            }
            
            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .roadmap-item {
                flex-direction: column;
            }
            
            .roadmap-number {
                min-width: auto;
            }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
