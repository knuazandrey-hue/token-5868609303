<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$MOONCAT - The Ultimate Meme Token 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0a2e 50%, #16213e 100%);
            color: #fff;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        nav {
            position: fixed;
            width: 100%;
            background: rgba(10, 10, 31, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            z-index: 1000;
            border-bottom: 2px solid #ff6b35;
        }

        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b35, #f7931e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #ff6b35;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 80px;
        }

        .hero-content {
            animation: slideInLeft 1s ease-out;
        }

        .hero h1 {
            font-size: 80px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b35, #f7931e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        .hero-cat {
            font-size: 150px;
            animation: float 3s ease-in-out infinite;
            margin: 30px 0;
            filter: drop-shadow(0 0 30px #ff6b35);
        }

        .hero p {
            font-size: 24px;
            margin-bottom: 40px;
            color: #ffd700;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.6);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
        }

        .btn-secondary:hover {
            background: #ffd700;
            color: #0a0a1f;
        }

        section {
            padding: 100px 0;
        }

        h2 {
            font-size: 48px;
            text-align: center;
            margin-bottom: 60px;
            background: linear-gradient(45deg, #ff6b35, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 107, 53, 0.3);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #ff6b35;
            box-shadow: 0 10px 40px rgba(255, 107, 53, 0.3);
        }

        .card-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .card p {
            color: #ccc;
            line-height: 1.6;
        }

        .tokenomics {
            background: rgba(255, 107, 53, 0.05);
            border-radius: 30px;
            padding: 50px;
            margin: 40px 0;
        }

        .tokenomics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            text-align: center;
        }

        .token-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .token-item h3 {
            font-size: 36px;
            color: #ff6b35;
            margin-bottom: 10px;
        }

        .roadmap {
            position: relative;
        }

        .roadmap-timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .roadmap-item {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
            animation: slideInRight 1s ease-out;
        }

        .roadmap-number {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b35;
            min-width: 80px;
        }

        .roadmap-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border-left: 4px solid #ffd700;
            flex: 1;
        }

        .roadmap-content h3 {
            color: #ffd700;
            margin-bottom: 15px;
        }

        .roadmap-content ul {
            list-style: none;
            padding-left: 20px;
        }

        .roadmap-content li {
            margin-bottom: 10px;
            color: #ccc;
        }

        .roadmap-content li:before {
            content: "🚀 ";
            margin-right: 10px;
        }

        .game-container {
            background: rgba(255, 107, 53, 0.1);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            margin: 40px 0;
        }

        .game-board {
            display: inline-block;
            background: rgba(10, 10, 31, 0.8);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
        }

        .cat-catcher {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
            margin: 20px 0;
        }

        .cat-box {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ff6b35;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cat-box:hover {
            background: rgba(255, 107, 53, 0.3);
            transform: scale(1.1);
        }

        .cat-box.active {
            animation: pulse 0.5s;
        }

        .game-score {
            font-size: 32px;
            color: #ffd700;
            margin: 20px 0;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }

        .social-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            text-decoration: none;
            transition: all 0.3s;
            border: 3px solid;
        }

        .social-btn.twitter {
            background: #1DA1F2;
            border-color: #1DA1F2;
        }

        .social-btn.telegram {
            background: #0088cc;
            border-color: #0088cc;
        }

        .social-btn:hover {
            transform: scale(1.2) rotate(360deg);
        }

        footer {
            text-align: center;
            padding: 40px 0;
            background: rgba(10, 10, 31, 0.9);
            margin-top: 100px;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 48px;
            }

            .hero-cat {
                font-size: 100px;
            }

            .nav-links {
                display: none;
            }

            h2 {
                font-size: 36px;
            }

            .cat-catcher {
                grid-template-columns: repeat(3, 80px);
            }

            .cat-box {
                width: 80px;
                height: 80px;
            }

            .tokenomics {
                padding: 30px 20px;
            }
        }

        .spinning-coin {
            display: inline-block;
            animation: rotate 3s linear infinite;
        }

        .how-to-buy {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 30px;
            padding: 50px;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .step {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 107, 53, 0.3);
            transition: all 0.3s;
        }

        .step:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
        }

        .step-number {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin: 0 auto 20px;
        }
    </style>
</head>
