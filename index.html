<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$KITTY - The Cutest Meme Token on Solana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3e 50%, #2a1a4e 100%);
            color: #fff;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        header {
            position: relative;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            z-index: 10;
        }

        .logo {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 105, 180, 0.6));
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6ec7, #ffd700, #7fff00, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 3s linear infinite;
            text-shadow: 0 0 30px rgba(255, 110, 199, 0.5);
        }

        .tagline {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: #ffd700;
            animation: pulse 2s infinite;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 50px;
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover:before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6ec7 0%, #ff1493 100%);
            color: white;
            box-shadow: 0 5px 25px rgba(255, 20, 147, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 35px rgba(255, 20, 147, 0.7);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #00d4ff 0%, #0080ff 100%);
            color: white;
            box-shadow: 0 5px 25px rgba(0, 128, 255, 0.5);
        }

        .btn-secondary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 35px rgba(0, 128, 255, 0.7);
        }

        .btn-tertiary {
            background: linear-gradient(135deg, #7fff00 0%, #32cd32 100%);
            color: white;
            box-shadow: 0 5px 25px rgba(127, 255, 0, 0.5);
        }

        .btn-tertiary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 35px rgba(127, 255, 0, 0.7);
        }

        section {
            position: relative;
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            z-index: 10;
            animation: slideIn 0.8s ease-out;
        }

        h2 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 50px;
            background: linear-gradient(45deg, #ff6ec7, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .about-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 2px solid rgba(255, 110, 199, 0.3);
            font-size: 1.2rem;
            line-height: 1.8;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .tokenomics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .token-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid rgba(255, 110, 199, 0.3);
            transition: all 0.3s;
            text-align: center;
        }

        .token-card:hover {
            transform: translateY(-10px);
            border-color: #ff6ec7;
            box-shadow: 0 15px 50px rgba(255, 110, 199, 0.4);
        }

        .token-card h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .token-card p {
            font-size: 1.1rem;
            color: #ccc;
        }

        .roadmap {
            position: relative;
            padding-left: 50px;
        }

        .roadmap-item {
            position: relative;
            padding: 30px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border-left: 5px solid #ff6ec7;
            transition: all 0.3s;
        }

        .roadmap-item:hover {
            transform: translateX(10px);
            border-left-color: #ffd700;
            box-shadow: 0 10px 40px rgba(255, 110, 199, 0.3);
        }

        .roadmap-item h3 {
            font-size: 1.8rem;
            color: #ff6ec7;
            margin-bottom: 15px;
        }

        .roadmap-item ul {
            list-style: none;
            padding-left: 0;
        }

        .roadmap-item li {
            padding: 8px 0;
            font-size: 1.1rem;
            color: #ddd;
        }

        .roadmap-item li:before {
            content: "🐱 ";
            margin-right: 10px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 2px solid rgba(255, 110, 199, 0.3);
            text-align: center;
        }

        #gameCanvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin: 20px auto;
            display: block;
            border: 3px solid #ff6ec7;
            cursor: pointer;
        }

        .score {
            font-size: 2rem;
            color: #ffd700;
            margin: 20px 0;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .social-link {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .social-link:hover {
            transform: scale(1.2) rotate(360deg);
            border-color: #ff6ec7;
            box-shadow: 0 0 30px rgba(255, 110, 199, 0.6);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.3);
            margin-top: 50px;
            position: relative;
            z-index: 10;
        }

        .contract-address {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .tagline {
                font-size: 1.3rem;
            }

            .logo {
                width: 200px;
                height: 200px;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            h2 {
                font-size: 2rem;
            }
        }

        .floating-kitty {
            position: fixed;
            font-size: 3rem;
            animation: floatAcross 15s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes floatAcross {
            0% {
                left: -100px;
                top: 20%;
            }
            100% {
                left: 100%;
                top: 80%;
            }
        }
    </style>
</head>
