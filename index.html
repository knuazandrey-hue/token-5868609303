<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SketchCat | $SCAT — Roughly drawn. Absolutely unstoppable.</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
--primary: #000000;
--secondary: #f5f5f5;
--bg-start: #ffffff;
--bg-end: #e8e8e8;
--glow: rgba(0,0,0,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
background:linear-gradient(135deg,var(--bg-start),var(--bg-end));
font-family:'Caveat',cursive;
color:var(--primary);
overflow-x:hidden;
min-height:100vh;
}
canvas#particles{position:fixed;top:0;left:0;pointer-events:none;z-index:0;}

@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-20px) rotate(2deg)}}
@keyframes textGlow{0%,100%{text-shadow:0 0 20px var(--glow)}50%{text-shadow:0 0 60px var(--glow),0 0 100px var(--glow)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes btnPulse{0%,100%{box-shadow:0 0 20px var(--glow)}50%{box-shadow:0 0 50px var(--glow),0 0 100px var(--glow)}}
@keyframes sketchy-wobble{
0%{transform:rotate(-1deg) translate(0,0);}
20%{transform:rotate(1.2deg) translate(1px,-1px);}
40%{transform:rotate(-0.8deg) translate(-1px,1px);}
60%{transform:rotate(1deg) translate(1px,1px);}
80%{transform:rotate(-1.2deg) translate(-1px,-1px);}
100%{transform:rotate(-1deg) translate(0,0);}
}
@keyframes wobble-btn{
0%,100%{transform:rotate(-0.5deg);}
25%{transform:rotate(0.7deg) skew(0.5deg);}
50%{transform:rotate(-0.3deg) skew(-0.5deg);}
75%{transform:rotate(0.5deg);}
}
@keyframes draw-line{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes cat-walk{
0%{transform:translateX(0) scaleX(1);}
49%{transform:translateX(calc(100vw - 120px)) scaleX(1);}
50%{transform:translateX(calc(100vw - 120px)) scaleX(-1);}
100%{transform:translateX(0) scaleX(-1);}
}
@keyframes plus-one{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.5);}}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes ink-drop{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes border-sketch{
0%{border-radius:2px 5px 3px 4px / 4px 2px 5px 3px;}
25%{border-radius:5px 2px 4px 3px / 3px 5px 2px 4px;}
50%{border-radius:3px 4px 5px 2px / 5px 3px 4px 2px;}
75%{border-radius:4px 3px 2px 5px / 2px 4px 3px 5px;}
100%{border-radius:2px 5px 3px 4px / 4px 2px 5px 3px;}
}

/* NAVBAR */
nav{
position:fixed;top:0;left:0;right:0;z-index:1000;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-bottom:2.5px solid #000;
padding:12px 30px;
display:flex;align-items:center;justify-content:space-between;
animation:border-sketch 4s infinite;
}
.nav-logo{
font-family:'Permanent Marker',cursive;
font-size:1.6rem;
animation:sketchy-wobble 3s infinite;
letter-spacing:1px;
cursor:pointer;
}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{
font-family:'Caveat',cursive;
font-size:1.1rem;
font-weight:700;
text-decoration:none;
color:#000;
transition:all 0.2s;
padding:4px 8px;
border:2px solid transparent;
border-radius:3px;
animation:wobble-btn 4s infinite;
}
.nav-links a:hover{border:2px solid #000;background:#f0f0f0;}
.nav-buy{
background:#000;color:#fff;
font-family:'Permanent Marker',cursive;
font-size:1rem;
border:none;cursor:pointer;
padding:8px 20px;
border-radius:3px;
animation:btnPulse 2s infinite,wobble-btn 3s infinite;
transition:all 0.2s;
}
.nav-buy:hover{background:#333;transform:scale(1.05);}

/* WALKING CAT */
#walking-cat{
position:fixed;
bottom:0;left:0;
z-index:999;
width:80px;height:80px;
object-fit:contain;
pointer-events:none;
animation:cat-walk 15s linear infinite;
filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
}

/* HERO */
#hero{
min-height:100vh;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
padding:120px 20px 60px;
position:relative;z-index:1;
text-align:center;
}
.mascot{
width:260px;height:260px;
object-fit:contain;
animation:float 3s ease-in-out infinite;
filter:drop-shadow(4px 4px 8px rgba(0,0,0,0.2));
border:3px solid #000;
border-radius:50%;
background:#fff;
}
.hero-title{
font-family:'Permanent Marker',cursive;
font-size:clamp(3rem,8vw,6rem);
margin:20px 0 10px;
animation:textGlow 3s infinite,fadeInUp 1s ease;
background:linear-gradient(135deg,#000,#555,#000);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}
.hero-ticker{
font-family:'Permanent Marker',cursive;
font-size:clamp(1.5rem,4vw,2.5rem);
color:#000;
border:3px solid #000;
padding:6px 20px;
display:inline-block;
margin:10px 0;
animation:wobble-btn 2.5s infinite,border-sketch 3s infinite;
}
.hero-slogan{
font-size:1.5rem;
font-weight:600;
color:#333;
margin:15px 0 25px;
min-height:40px;
}
.ca-box{
background:rgba(0,0,0,0.05);
border:2.5px solid #000;
border-radius:4px;
padding:10px 20px;
display:flex;align-items:center;gap:12px;
margin:15px 0 25px;
animation:border-sketch 4s infinite;
cursor:pointer;
max-width:500px;
}
.ca-text{
font-family:'Caveat',cursive;
font-size:0.95rem;
word-break:break-all;
font-weight:600;
}
.ca-copy{
background:#000;color:#fff;
border:none;cursor:pointer;
padding:6px 14px;
font-family:'Caveat',cursive;
font-size:1rem;
border-radius:3px;
white-space:nowrap;
animation:wobble-btn 3s infinite;
}
.hero-btns{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;}
.btn-primary{
background:#000;color:#fff;
font-family:'Permanent Marker',cursive;
font-size:1.1rem;
border:3px solid #000;
padding:12px 30px;
border-radius:4px;
cursor:pointer;
text-decoration:none;
display:inline-block;
animation:btnPulse 2s infinite,wobble-btn 3s infinite,border-sketch 4s infinite;
transition:all 0.2s;
}
.btn-primary:hover{background:#333;transform:scale(1.05);}
.btn-secondary{
background:transparent;color:#000;
font-family:'Permanent Marker',cursive;
font-size:1.1rem;
border:3px solid #000;
padding:12px 30px;
border-radius:4px;
cursor:pointer;
text-decoration:none;
display:inline-block;
animation:wobble-btn 2.5s infinite,border-sketch 3.5s infinite;
transition:all 0.2s;
}
.btn-secondary:hover{background:#f0f0f0;}

/* SECTIONS */
section{padding:80px 20px;position:relative;z-index:1;}
.section-title{
font-family:'Permanent Marker',cursive;
font-size:clamp(2rem,5vw,3.5rem);
text-align:center;
margin-bottom:50px;
animation:textGlow 4s infinite,sketchy-wobble 5s infinite;
}
.container{max-width:1100px;margin:0 auto;}

/* STATS */
#stats{background:rgba(255,255,255,0.4);}
.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}
.stat-card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
border:3px solid #000;
border-radius:5px;
padding:30px;
text-align:center;
animation:sketchy-wobble 4s infinite,border-sketch 5s infinite;
transition:transform 0.2s;
}
.stat-card:hover{transform:scale(1.03) rotate(1deg);}
.stat-num{
font-family:'Permanent Marker',cursive;
font-size:2.8rem;
animation:textGlow 3s infinite;
}
.stat-label{
font-size:1.2rem;
font-weight:600;
color:#444;
margin-top:8px;
}

/* ABOUT */
.about-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}
.about-card{
border:3px solid #000;
border-radius:5px;
padding:30px;
background:rgba(255,255,255,0.6);
animation:sketchy-wobble 3.5s infinite,border-sketch 4s infinite;
transition:transform 0.2s;
}
.about-card:nth-child(2){animation-delay:0.5s;}
.about-card:nth-child(3){animation-delay:1s;}
.about-card:hover{transform:rotate(-1deg) scale(1.02);}
.about-icon{font-size:3rem;margin-bottom:15px;}
.about-card h3{
font-family:'Permanent Marker',cursive;
font-size:1.5rem;
margin-bottom:12px;
}
.about-card p{font-size:1.1rem;line-height:1.6;color:#333;}

/* TOKENOMICS */
#tokenomics{background:rgba(255,255,255,0.3);}
.token-wrap{display:flex;align-items:center;justify-content:center;gap:50px;flex-wrap:wrap;}
.token-chart{
width:220px;height:220px;
border-radius:50%;
background:conic-gradient(
#000 0% 40%,
#555 40% 60%,
#888 60% 75%,
#aaa 75% 85%,
#ccc 85% 100%
);
border:4px solid #000;
display:flex;align-items:center;justify-content:center;
position:relative;
animation:sketchy-wobble 4s infinite;
box-shadow:4px 4px 0 #000;
}
.token-center{
width:80px;height:80px;
background:#fff;border-radius:50%;
border:3px solid #000;
display:flex;align-items:center;justify-content:center;
font-family:'Permanent Marker',cursive;
font-size:1rem;
}
.token-list{list-style:none;}
.token-list li{
font-size:1.2rem;
padding:8px 0;
display:flex;align-items:center;gap:10px;
font-weight:600;
}
.token-dot{width:16px;height:16px;border-radius:50%;border:2px solid #000;display:inline-block;}

/* ROADMAP */
.roadmap-wrap{max-width:700px;margin:0 auto;}
.phase{
border:3px solid #000;
border-radius:5px;
padding:20px 25px;
margin-bottom:20px;
position:relative;
background:rgba(255,255,255,0.6);
animation:sketchy-wobble 4s infinite,border-sketch 5s infinite;
}
.phase:nth-child(2){animation-delay:0.4s;}
.phase:nth-child(3){animation-delay:0.8s;}
.phase:nth-child(4){animation-delay:1.2s;}
.phase-header{display:flex;align-items:center;gap:15px;margin-bottom:12px;}
.phase-badge{
font-family:'Permanent Marker',cursive;
font-size:0.85rem;
padding:4px 12px;
border-radius:3px;
border:2px solid #000;
}
.badge-done{background:#000;color:#fff;}
.badge-active{background:#555;color:#fff;animation:btnPulse 2s infinite;}
.badge-upcoming{background:transparent;color:#000;}
.phase h3{
font-family:'Permanent Marker',cursive;
font-size:1.4rem;
}
.phase ul{list-style:none;padding-left:10px;}
.phase ul li{
font-size:1.1rem;
padding:4px 0;
color:#333;
}
.phase ul li:before{content:"✏️ ";font-size:0.9rem;}
.phase-done ul li:before{content:"✅ ";}
.phase-active ul li:before{content:"🔥 ";}

/* HOW TO BUY */
#howtobuy{background:rgba(255,255,255,0.3);}
.steps-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}
.step-card{
border:3px solid #000;
border-radius:5px;
padding:25px;
text-align:center;
background:rgba(255,255,255,0.6);
animation:sketchy-wobble 3s infinite,border-sketch 4s infinite;
}
.step-num{
font-family:'Permanent Marker',cursive;
font-size:3rem;
animation:textGlow 3s infinite;
}
.step-card h3{
font-family:'Permanent Marker',cursive;
font-size:1.3rem;
margin:10px 0 8px;
}
.step-card p{font-size:1.05rem;color:#444;line-height:1.5;}

/* GAME CLICKER */
#game{background:rgba(255,255,255,0.4);}
.game-wrap{
display:flex;flex-direction:column;align-items:center;
gap:25px;
}
.game-score{
font-family:'Permanent Marker',cursive;
font-size:3rem;
animation:textGlow 3s infinite;
}
.game-level{
font-size:1.3rem;
font-weight:700;
color:#555;
}
.clicker-mascot{
width:180px;height:180px;
object-fit:contain;
cursor:pointer;
border:3px solid #000;
border-radius:50%;
background:#fff;
transition:transform 0.1s;
animation:border-sketch 3s infinite;
position:relative;
z-index:2;
}
.clicker-mascot:active{transform:scale(0.9) rotate(5deg);}
.clicker-wrap{position:relative;display:inline-block;}
.plus-anim{
position:absolute;
top:-20px;left:50%;
transform:translateX(-50%);
font-family:'Permanent Marker',cursive;
font-size:1.5rem;
color:#000;
pointer-events:none;
animation:plus-one 0.8s ease-out forwards;
}
.level-bar-wrap{
width:300px;
border:3px solid #000;
border-radius:4px;
height:20px;
background:#f0f0f0;
overflow:hidden;
}
.level-bar{
height:100%;
background:#000;
transition:width 0.3s;
}
.clicker-hint{font-size:1.1rem;color:#555;}

/* SKETCH GAME */
#sketchgame{background:rgba(0,0,0,0.04);}
.sketch-wrap{
display:flex;flex-direction:column;align-items:center;
gap:20px;
}
.sketch-info{
display:flex;gap:30px;flex-wrap:wrap;justify-content:center;
font-family:'Permanent Marker',cursive;
font-size:1.4rem;
}
.sketch-info span{
border:3px solid #000;
padding:6px 16px;
border-radius:4px;
animation:border-sketch 3s infinite;
}
#sketchCanvas{
border:4px solid #000;
border-radius:6px;
cursor:crosshair;
background:#fff;
box-shadow:5px 5px 0 #000;
animation:border-sketch 5s infinite;
max-width:100%;
}
.sketch-btns{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;}
.sketch-leaderboard{
border:3px solid #000;
border-radius:5px;
padding:20px;
background:rgba(255,255,255,0.7);
min-width:280px;
max-width:400px;
width:100%;
animation:sketchy-wobble 5s infinite;
}
.sketch-leaderboard h3{
font-family:'Permanent Marker',cursive;
font-size:1.5rem;
margin-bottom:15px;
text-align:center;
}
.lb-item{
display:flex;justify-content:space-between;
padding:6px 0;
border-bottom:2px dashed #ccc;
font-size:1.1rem;
font-weight:600;
}
.sketch-gallery{margin-top:20px;width:100%;}
.sketch-gallery h3{
font-family:'Permanent Marker',cursive;
font-size:1.5rem;
text-align:center;
margin-bottom:15px;
}
.gallery-grid{
display:flex;gap:15px;flex-wrap:wrap;justify-content:center;
}
.gallery-item{
border:3px solid #000;
border-radius:4px;
width:120px;height:120px;
overflow:hidden;
animation:sketchy-wobble 4s infinite;
}
.gallery-item canvas{width:100%;height:100%;}
.gallery-score{
font-family:'Caveat',cursive;
font-size:1rem;
font-weight:700;
text-align:center;
background:#000;
color:#fff;
padding:2px 0;
}

/* COMMUNITY */
#community{background:rgba(255,255,255,0.3);}
.community-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
max-width:800px;
margin:0 auto;
}
.community-card{
border:3px solid #000;
border-radius:5px;
padding:30px;
text-align:center;
background:rgba(255,255,255,0.6);
text-decoration:none;
color:#000;
display:block;
animation:sketchy-wobble 3s infinite,border-sketch 4s infinite;
transition:transform 0.2s;
}
.community-card:hover{transform:scale(1.05) rotate(1deg);background:#f0f0f0;}
.community-icon{font-size:3rem;margin-bottom:12px;}
.community-card h3{
font-family:'Permanent Marker',cursive;
font-size:1.4rem;
margin-bottom:8px;
}
.community-card p{font-size:1.1rem;color:#444;}

/* FOOTER */
footer{
border-top:3px solid #000;
padding:30px 20px;
text-align:center;
background:rgba(255,255,255,0.5);
position:relative;z-index:1;
animation:border-sketch 5s infinite;
}
footer p{font-size:1rem;color:#666;max-width:700px;margin:0 auto 10px;}
footer .footer-logo{
font-family:'Permanent Marker',cursive;
font-size:1.5rem;
margin-bottom:10px;
animation:sketchy-wobble 4s infinite;
}

/* TOAST */
.toast{
position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
background:#000;color:#fff;
font-family:'Permanent Marker',cursive;
font-size:1.1rem;
padding:10px 25px;
border-radius:4px;
z-index:9999;
opacity:0;
transition:opacity 0.3s;
}
.toast.show{opacity:1;}

/* SVG doodle decoration */
.doodle-divider{
width:100%;
height:30px;
position:relative;
overflow:hidden;
}
.doodle-divider svg{
width:100%;
height:100%;
}
.sketchy-line{
stroke:#000;
stroke-width:2;
fill:none;
stroke-dasharray:1000;
stroke-dashoffset:0;
}

/* Progress bar for sketch game */
#sketchTimer{
width:100%;
max-width:500px;
height:20px;
border:3px solid #000;
border-radius:4px;
overflow:hidden;
background:#f0f0f0;
}
#sketchTimerBar{
height:100%;
background:#000;
transition:width 0.1s linear;
}

@media(max-width:600px){
.hero-title{font-size:2.5rem;}
.mascot{width:180px;height:180px;}
nav{padding:10px 15px;}
.nav-links a{font-size:0.9rem;}
}
</style>
</head>

window.addEventListener('load', function() {
  // Принудительно показываем весь контент
  var tags = ['section','div','header','footer','nav','main','article','h1','h2','h3','p','a','button','img'];
  tags.forEach(function(tag) {
    document.querySelectorAll(tag).forEach(function(el) {
      var style = window.getComputedStyle(el);
      if (style.opacity === '0' || style.visibility === 'hidden' || style.display === 'none') {
        if (!el.classList.contains('particle') && !el.id.includes('particle')) {
          el.style.opacity = '1';
          el.style.visibility = 'visible';
        }
      }
    });
  });
});
</script>
