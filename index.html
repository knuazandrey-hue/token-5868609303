<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$SKETCHY — The Doodle Cat Memecoin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --accent: #b44dff;
  --cyan: #00ffcc;
  --bg-dark: #0a0015;
  --bg-mid: #0d0030;
  --bg-deep: #000a1a;
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text: #ffffff;
  --text-dim: rgba(255, 255, 255, 0.6);
}

html {
  scroll-behavior: smooth;
}

body {
  background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 50%, var(--bg-deep) 100%);
  background-attachment: fixed;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: var(--bg-dark);
}
::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 4px;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(180, 77, 255, 0.2);
  padding: 15px 0;
  transition: all 0.3s ease;
}

.navbar.scrolled {
  padding: 10px 0;
  background: rgba(0, 0, 0, 0.95);
}

.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-family: 'Orbitron', monospace;
  font-size: 1.5em;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  text-decoration: none;
}

.nav-logo span {
  font-size: 0.7em;
  opacity: 0.7;
}

.nav-links {
  display: flex;
  gap: 30px;
  list-style: none;
  align-items: center;
}

.nav-links a {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.9em;
  font-weight: 500;
  transition: all 0.3s ease;
  position: relative;
}

.nav-links a:hover {
  color: var(--accent);
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: width 0.3s ease;
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-btn {
  background: transparent;
  border: 2px solid var(--accent);
  color: var(--accent);
  padding: 8px 24px;
  border-radius: 50px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 20px rgba(180, 77, 255, 0.3);
  text-decoration: none;
  font-size: 0.9em;
}

.nav-btn:hover {
  background: var(--accent);
  color: #000;
  transform: translateY(-3px);
  box-shadow: 0 0 40px rgba(180, 77, 255, 0.6);
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 5px;
}

.hamburger span {
  width: 25px;
  height: 2px;
  background: var(--text);
  transition: all 0.3s ease;
}

/* ===== HERO SECTION ===== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 120px 20px 80px;
}

.hero-container {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  width: 100%;
}

.hero-content {
  z-index: 2;
}

.hero-badge {
  display: inline-block;
  background: rgba(180, 77, 255, 0.15);
  border: 1px solid rgba(180, 77, 255, 0.3);
  padding: 6px 18px;
  border-radius: 50px;
  font-size: 0.85em;
  color: var(--accent);
  margin-bottom: 20px;
  animation: fadeInUp 0.6s ease forwards;
}

.hero-title {
  font-family: 'Orbitron', monospace;
  font-size: 4em;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 20px;
  min-height: 1.2em;
  background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: 1.2em;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 35px;
  max-width: 500px;
}

.hero-buttons {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #8800ff);
  color: #fff;
  border: none;
  padding: 14px 36px;
  border-radius: 50px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 30px rgba(180, 77, 255, 0.4);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 50px rgba(180, 77, 255, 0.7);
}

.btn-secondary {
  background: transparent;
  color: var(--cyan);
  border: 2px solid var(--cyan);
  padding: 14px 36px;
  border-radius: 50px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-secondary:hover {
  background: rgba(0, 255, 204, 0.1);
  transform: translateY(-3px);
  box-shadow: 0 0 40px rgba(0, 255, 204, 0.4);
}

.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

.cat-container {
  position: relative;
  width: 400px;
  height: 400px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.cat-glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(180, 77, 255, 0.3) 0%, transparent 70%);
  border-radius: 50%;
  animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.2); opacity: 0.8; }
}

.cat-svg {
  position: relative;
  z-index: 2;
}

/* ===== STATS BAR ===== */
.stats-bar {
  position: relative;
  z-index: 2;
  padding: 60px 20px;
  background: rgba(0, 0, 0, 0.3);
  border-top: 1px solid var(--glass-border);
  border-bottom: 1px solid var(--glass-border);
}

.stats-container {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.stat-card {
  text-align: center;
  padding: 30px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 10px 40px rgba(180, 77, 255, 0.2);
}

.stat-icon {
  font-size: 2em;
  margin-bottom: 10px;
}

.stat-number {
  font-family: 'Orbitron', monospace;
  font-size: 2.5em;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-label {
  color: var(--text-dim);
  font-size: 0.9em;
  margin-top: 5px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* ===== ABOUT ===== */
.about-section {
  padding: 100px 20px;
  position: relative;
  z-index: 2;
}

.section-container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 60px;
}

.section-tag {
  display: inline-block;
  background: rgba(180, 77, 255, 0.15);
  border: 1px solid rgba(180, 77, 255, 0.3);
  padding: 6px 18px;
  border-radius: 50px;
  font-size: 0.85em;
  color: var(--accent);
  margin-bottom: 15px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.section-title {
  font-family: 'Orbitron', monospace;
  font-size: 2.5em;
  font-weight: 800;
  margin-bottom: 15px;
}

.section-subtitle {
  color: var(--text-dim);
  font-size: 1.1em;
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.6;
}

.about-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

.about-card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 40px 30px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.about-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.about-card:hover {
  transform: translateY(-5px);
  border-color: rgba(180, 77, 255, 0.3);
  box-shadow: 0 10px 40px rgba(180, 77, 255, 0.15);
}

.about-card:hover::before {
  opacity: 1;
}

.about-icon {
  font-size: 2.5em;
  margin-bottom: 20px;
}

.about-card h3 {
  font-family: 'Orbitron', monospace;
  font-size: 1.2em;
  margin-bottom: 12px;
  color: var(--accent);
}

.about-card p {
  color: var(--text-dim);
  line-height: 1.6;
  font-size: 0.95em;
}

/* ===== CONCEPT ===== */
.concept-section {
  padding: 100px 20px;
  position: relative;
  z-index: 2;
}

.concept-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.concept-text h3 {
  font-family: 'Orbitron', monospace;
  font-size: 1.8em;
  margin-bottom: 20px;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.concept-text p {
  color: var(--text-dim);
  line-height: 1.8;
  font-size: 1em;
  margin-bottom: 15px;
}

.concept-features {
  list-style: none;
  margin-top: 25px;
}

.concept-features li {
  padding: 10px 0;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.95em;
}

.concept-features li .check {
  color: var(--cyan);
  font-size: 1.2em;
}

.concept-visual {
  display: flex;
  justify-content: center;
}

.concept-card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 450px;
}

.concept-card .quote {
  font-size: 1.4em;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 20px;
  line-height: 1.5;
}

.concept-card .attribution {
  color: var(--text-dim);
  font-size: 0.9em;
}

/* ===== TOKENOMICS ===== */
.tokenomics-section {
  padding: 100px 20px;
  position: relative;
  z-index: 2;
}

.tokenomics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.pie-chart {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  background: conic-gradient(
    var(--accent) 0deg 180deg,
    var(--cyan) 180deg 252deg,
    #ff6b6b 252deg 306deg,
    #ffd93d 306deg 360deg
  );
  position: relative;
  margin: 0 auto;
  box-shadow: 0 0 60px rgba(180, 77, 255, 0.3);
  animation: rotate-slow 20s linear infinite;
}

@keyframes rotate-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.pie-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-mid));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
}

.pie-center span {
  font-family: 'Orbitron', monospace;
  font-size: 0.8em;
  color: var(--accent);
  font-weight: 700;
}

.pie-center strong {
  font-family: 'Orbitron', monospace;
  font-size: 1.4em;
  color: #fff;
}

.tokenomics-details {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.token-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 18px 24px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  transition: all 0.3s ease;
}

.token-item:hover {
  transform: translateX(10px);
  border-color: var(--accent);
}

.token-color {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}

.token-info {
  flex: 1;
}

.token-info h4 {
  font-size: 1em;
  margin-bottom: 3px;
}

.token-info p {
  color: var(--text-dim);
  font-size: 0.85em;
}

.token-pct {
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  color: var(--accent);
  font-size: 1.2em;
}

/* ===== ROADMAP ===== */
.roadmap-section {
  padding: 100px 20px;
  position: relative;
  z-index: 2;
}

.timeline {
  position: relative;
  max-width: 700px;
  margin: 0 auto;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 30px;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), var(--cyan), var(--accent));
  border-radius: 3px;
}

.timeline-item {
  position: relative;
  padding-left: 80px;
  margin-bottom: 50px;
}

.timeline-icon {
  position: absolute;
  left: 14px;
  top: 0;
  width: 35px;
  height: 35px;
  background: var(--bg-dark);
  border: 3px solid var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1em;
  z-index: 2;
}

.timeline-icon.completed {
  background: var(--accent);
  border-color: var(--accent);
}

.timeline-icon.current {
  border-color: var(--cyan);
  box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
}

.timeline-card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 28px;
  transition: all 0.3s ease;
}

.timeline-card:hover {
  border-color: var(--accent);
  box-shadow: 0 5px 30px rgba(180, 77, 255, 0.15);
  transform: translateX(5px);
}

.timeline-phase {
  font-family: 'Orbitron', monospace;
  color: var(--accent);
  font-size: 0.8em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.timeline-card h3 {
  font-size: 1.3em;
  margin-bottom: 12px;
}

.timeline-card ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.timeline-card ul li {
  color: var(--text-dim);
  font-size: 0.9em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.timeline-card ul li::before {
  content: '→';
  color: var(--cyan);
  font-weight: bold;
}

/* ===== HOW TO BUY ===== */
.howtobuy-section {
  padding: 100px 20px;
  position: relative;
  z-index: 2;
}

.steps-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 25px;
}

.step-card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 35px 25px;
  text-align: center;
  position: relative;
  transition: all 0.3s ease;
}

.step-card:hover {
  transform: translateY(-8px);
  border-color: var(--accent);
  box-shadow: 0 15px 50px rgba(180, 77, 255, 0.2);
}

.step-number {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--accent), #8800ff);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-weight: 800;
  font-size: 0.9em;
}

.step-icon {
  font-size: 3em;
  margin: 15px 0 20px;
}

.step-card h3 {
  font-size: 1.1em;
  margin-bottom: 10px;
  color: var(--accent);
}

.step-card p {
  color: var(--text-dim);
  font-size: 0.9em;
  line-height: 1.5;
}

/* ===== GAME SECTION ===== */
.game-section {
  padding: 100px 20px;
  position: relative;
  z-index: 2;
}

.game-wrapper {
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 30px;
  padding: 50px 40px;
  position: relative;
  overflow: hidden;
}

.game-wrapper::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--cyan), var(--accent));
  background-size: 200% 100%;
  animation: gradientShift 3s ease infinite;
}

.game-title {
  font-family: 'Orbitron', monospace;
  font-size: 1.8em;
  margin-bottom: 10px;
}

.game-subtitle {
  color: var(--text-dim);
  margin-bottom: 30px;
}

.game-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 30px;
}

.game-stat {
  text-align: center;
}

.game-stat-label {
  color: var(--text-dim);
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.game-stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 2em;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#clicker-btn {
  font-size: 100px;
  cursor: pointer;
  display: inline-block;
  user-select: none;
  transition: transform 0.1s ease;
  filter: drop-shadow(0 0 20px rgba(180, 77, 255, 0.5));
  line-height: 1;
}

#clicker-btn:hover {
  filter: drop-shadow(0 0 40px rgba(180, 77, 255, 0.8));
}

#click-effects {
  position: relative;
  height: 60px;
  overflow: hidden;
}

.level-bar {
  width: 100%;
  height: 8px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 4px;
  margin-top: 20px;
  overflow: hidden;
}

.level-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  border-radius: 4px;
  transition: width 0.3s ease;
  width: 0%;
}

/* ===== COMMUNITY ===== */
.community-section {
  padding: 100px 20px;
  position: relative;
  z-index: 2;
}

.social-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  max-width: 900px;
  margin: 0 auto;
}

.social-card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 40px 30px;
  text-align: center;
  transition: all 0.3s ease;
  cursor: pointer;
  text-decoration: none;
  display: block;
}

.social-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--accent);
  box-shadow: 0 15px 50px rgba(180, 77, 255, 0.2);
}

.social-card.twitter:hover {
  border-color: #1DA1F2;
  box-shadow: 0 15px 50px rgba(29, 161, 242, 0.3);
}

.social-card.telegram:hover {
  border-color: #0088cc;
  box-shadow: 0 15px 50px rgba(0, 136, 204, 0.3);
}

.social-card.pump:hover {
  border-color: var(--cyan);
  box-shadow: 0 15px 50px rgba(0, 255, 204, 0.3);
}

.social-icon {
  font-size: 3em;
  margin-bottom: 15px;
  display: block;
}

.social-card h3 {
  font-size: 1.2em;
  margin-bottom: 8px;
}

.social-card p {
  color: var(--text-dim);
  font-size: 0.9em;
}
