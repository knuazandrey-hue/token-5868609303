<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKEN Token - To the moon and back</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
--primary: #7b2fff;
--secondary: #00ffcc;
--bg-start: #05001a;
--bg-end: #0a0030;
--glow: rgba(123, 47, 255, 0.8);
}

@keyframes float {
0%, 100% { transform: translateY(0) rotate(-2deg); }
50% { transform: translateY(-20px) rotate(2deg); }
}

@keyframes textGlow {
0%, 100% { text-shadow: 0 0 20px var(--glow); }
50% { text-shadow: 0 0 60px var(--glow), 0 0 100px var(--glow); }
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(40px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes btnPulse {
0%, 100% { box-shadow: 0 0 20px var(--glow); }
50% { box-shadow: 0 0 50px var(--glow), 0 0 100px var(--glow); }
}

@keyframes bouncy {
0%, 100% { transform: scale(1) translateY(0); }
25% { transform: scale(1.05) translateY(-10px); }
50% { transform: scale(0.97) translateY(0); }
75% { transform: scale(1.02) translateY(-5px); }
}

@keyframes spin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

@keyframes typewriterCursor {
0%, 100% { border-right-color: var(--secondary); }
50% { border-right-color: transparent; }
}

@keyframes slideInLeft {
from { opacity: 0; transform: translateX(-60px); }
to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInRight {
from { opacity: 0; transform: translateX(60px); }
to { opacity: 1; transform: translateX(0); }
}

@keyframes pulseRing {
0% { transform: scale(0.8); opacity: 1; }
100% { transform: scale(2.5); opacity: 0; }
}

@keyframes countPop {
0% { transform: scale(1); }
50% { transform: scale(1.3); }
100% { transform: scale(1); }
}

@keyframes rocketFly {
0% { transform: translateY(0) rotate(0deg); }
25% { transform: translateY(-15px) rotate(5deg); }
50% { transform: translateY(-5px) rotate(-3deg); }
75% { transform: translateY(-20px) rotate(3deg); }
100% { transform: translateY(0) rotate(0deg); }
}

@keyframes gradientShift {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

@keyframes particleFade {
0% { opacity: 1; transform: scale(1); }
100% { opacity: 0; transform: scale(0); }
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
color: #ffffff;
font-family: 'Inter', sans-serif;
overflow-x: hidden;
min-height: 100vh;
}

#particleCanvas {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 9999;
}

/* NAVBAR */
nav {
position: fixed;
top: 0;
left: 0;
width: 100%;
z-index: 1000;
backdrop-filter: blur(20px);
background: rgba(5, 0, 26, 0.7);
border-bottom: 1px solid rgba(123, 47, 255, 0.3);
padding: 15px 0;
}

.nav-container {
max-width: 1200px;
margin: 0 auto;
display: flex;
justify-content: space-between;
align-items: center;
padding: 0 20px;
}

.nav-logo {
font-family: 'Orbitron', monospace;
font-size: 1.5rem;
font-weight: 900;
background: linear-gradient(90deg, var(--primary), var(--secondary));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.nav-links {
display: flex;
gap: 25px;
align-items: center;
}

.nav-links a {
color: rgba(255,255,255,0.8);
text-decoration: none;
font-size: 0.9rem;
transition: color 0.3s;
}

.nav-links a:hover {
color: var(--secondary);
}

.btn-buy {
background: linear-gradient(135deg, var(--primary), #a855f7);
color: white;
border: none;
padding: 10px 25px;
border-radius: 30px;
font-family: 'Orbitron', monospace;
font-weight: 700;
cursor: pointer;
animation: btnPulse 2s infinite;
transition: transform 0.3s;
font-size: 0.9rem;
text-decoration: none;
}

.btn-buy:hover {
transform: scale(1.1);
}

/* HERO */
.hero {
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 120px 20px 60px;
position: relative;
}

.hero::before {
content: '';
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 600px;
height: 600px;
background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
opacity: 0.15;
border-radius: 50%;
pointer-events: none;
}

.mascot {
width: 250px;
height: 250px;
border-radius: 50%;
animation: float 3s ease-in-out infinite;
margin-bottom: 30px;
border: 3px solid var(--primary);
box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(123, 47, 255, 0.3);
object-fit: cover;
}

.hero h1 {
font-family: 'Orbitron', monospace;
font-size: clamp(2.5rem, 8vw, 5rem);
font-weight: 900;
background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: textGlow 3s ease-in-out infinite, gradientShift 4s ease infinite;
margin-bottom: 15px;
}

.hero-slogan {
font-size: 1.4rem;
color: var(--secondary);
font-family: 'Orbitron', monospace;
min-height: 2em;
border-right: 3px solid var(--secondary);
display: inline-block;
animation: typewriterCursor 0.8s infinite;
padding-right: 5px;
}

.hero-buttons {
display: flex;
gap: 15px;
margin-top: 35px;
flex-wrap: wrap;
justify-content: center;
}

.btn-primary {
background: linear-gradient(135deg, var(--primary), #a855f7);
color: white;
border: none;
padding: 15px 35px;
border-radius: 30px;
font-family: 'Orbitron', monospace;
font-weight: 700;
font-size: 1rem;
cursor: pointer;
animation: btnPulse 2s infinite;
transition: transform 0.3s;
text-decoration: none;
display: inline-block;
}

.btn-primary:hover { transform: scale(1.08); }

.btn-secondary {
background: transparent;
color: var(--secondary);
border: 2px solid var(--secondary);
padding: 15px 35px;
border-radius: 30px;
font-family: 'Orbitron', monospace;
font-weight: 700;
font-size: 1rem;
cursor: pointer;
transition: all 0.3s;
text-decoration: none;
display: inline-block;
}

.btn-secondary:hover {
background: rgba(0, 255, 204, 0.1);
transform: scale(1.08);
}

.btn-outline {
background: transparent;
color: white;
border: 2px solid rgba(123, 47, 255, 0.5);
padding: 15px 35px;
border-radius: 30px;
font-family: 'Orbitron', monospace;
font-weight: 700;
font-size: 1rem;
cursor: pointer;
transition: all 0.3s;
}

.btn-outline:hover {
border-color: var(--primary);
background: rgba(123, 47, 255, 0.1);
}

.ca-container {
margin-top: 25px;
background: rgba(123, 47, 255, 0.1);
border: 1px solid rgba(123, 47, 255, 0.3);
border-radius: 15px;
padding: 12px 20px;
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
transition: all 0.3s;
max-width: 500px;
}

.ca-container:hover {
background: rgba(123, 47, 255, 0.2);
border-color: var(--primary);
}

.ca-label {
font-family: 'Orbitron', monospace;
font-size: 0.75rem;
color: var(--secondary);
}

.ca-address {
font-size: 0.8rem;
color: rgba(255,255,255,0.7);
word-break: break-all;
}

.ca-copy-icon {
font-size: 1.2rem;
}

.copy-feedback {
color: var(--secondary);
font-size: 0.8rem;
margin-top: 5px;
min-height: 1.2em;
}

/* SECTION STYLES */
section {
padding: 80px 20px;
max-width: 1200px;
margin: 0 auto;
}

.section-title {
font-family: 'Orbitron', monospace;
font-size: clamp(1.8rem, 4vw, 2.5rem);
text-align: center;
margin-bottom: 50px;
background: linear-gradient(90deg, var(--primary), var(--secondary));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

/* STATS */
.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 25px;
}

.stat-card {
background: rgba(123, 47, 255, 0.08);
backdrop-filter: blur(15px);
border: 1px solid rgba(123, 47, 255, 0.25);
border-radius: 20px;
padding: 35px 25px;
text-align: center;
transition: all 0.4s;
}

.stat-card:hover {
transform: translateY(-5px);
border-color: var(--secondary);
box-shadow: 0 10px 40px rgba(0, 255, 204, 0.15);
}

.stat-number {
font-family: 'Orbitron', monospace;
font-size: 2.5rem;
font-weight: 900;
color: var(--secondary);
margin-bottom: 8px;
}

.stat-label {
color: rgba(255,255,255,0.7);
font-size: 0.95rem;
}

/* ABOUT */
.about-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 25px;
}

.about-card {
background: rgba(123, 47, 255, 0.08);
backdrop-filter: blur(15px);
border: 1px solid rgba(123, 47, 255, 0.25);
border-radius: 20px;
padding: 35px 25px;
text-align: center;
transition: all 0.4s;
}

.about-card:hover {
transform: translateY(-8px);
border-color: var(--secondary);
box-shadow: 0 15px 50px rgba(0, 255, 204, 0.12);
}

.about-icon {
font-size: 3.5rem;
margin-bottom: 15px;
display: block;
animation: bouncy 2s ease-in-out infinite;
}

.about-card:nth-child(2) .about-icon { animation-delay: 0.3s; }
.about-card:nth-child(3) .about-icon { animation-delay: 0.6s; }

.about-card h3 {
font-family: 'Orbitron', monospace;
font-size: 1.2rem;
color: var(--secondary);
margin-bottom: 12px;
}

.about-card p {
color: rgba(255,255,255,0.7);
line-height: 1.6;
}

/* TOKENOMICS */
.tokenomics-container {
display: flex;
align-items: center;
justify-content: center;
gap: 60px;
flex-wrap: wrap;
}

.token-chart {
width: 280px;
height: 280px;
border-radius: 50%;
background: conic-gradient(
var(--primary) 0deg 144deg,
var(--secondary) 144deg 234deg,
#ff6b6b 234deg 288deg,
#ffd93d 288deg 324deg,
#a855f7 324deg 360deg
);
position: relative;
box-shadow: 0 0 40px var(--glow);
animation: spin 20s linear infinite;
flex-shrink: 0;
}

.token-chart::after {
content: '$TOKEN';
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 140px;
height: 140px;
background: var(--bg-start);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-family: 'Orbitron', monospace;
font-weight: 900;
font-size: 0.9rem;
color: var(--secondary);
animation: spin 20s linear infinite reverse;
}

.token-list {
list-style: none;
}

.token-list li {
padding: 12px 0;
font-size: 1.05rem;
display: flex;
align-items: center;
gap: 12px;
color: rgba(255,255,255,0.85);
}

.token-dot {
width: 14px;
height: 14px;
border-radius: 50%;
display: inline-block;
flex-shrink: 0;
}

/* ROADMAP */
.roadmap-timeline {
position: relative;
max-width: 700px;
margin: 0 auto;
}

.roadmap-timeline::before {
content: '';
position: absolute;
left: 30px;
top: 0;
bottom: 0;
width: 3px;
background: linear-gradient(to bottom, var(--primary), var(--secondary));
}

.roadmap-item {
position: relative;
padding-left: 75px;
margin-bottom: 45px;
}

.roadmap-dot {
position: absolute;
left: 20px;
top: 5px;
width: 24px;
height: 24px;
border-radius: 50%;
border: 3px solid var(--primary);
background: var(--bg-start);
z-index: 2;
}

.roadmap-item.done .roadmap-dot {
background: var(--secondary);
border-color: var(--secondary);
box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
}

.roadmap-item.active .roadmap-dot {
background: var(--primary);
border-color: var(--secondary);
box-shadow: 0 0 20px var(--glow);
animation: btnPulse 2s infinite;
}

.roadmap-item.active .roadmap-dot::after {
content: '';
position: absolute;
top: -6px;
left: -6px;
right: -6px;
bottom: -6px;
border-radius: 50%;
border: 2px solid var(--secondary);
animation: pulseRing 1.5s infinite;
}

.roadmap-content {
background: rgba(123, 47, 255, 0.08);
border: 1px solid rgba(123, 47, 255, 0.25);
border-radius: 15px;
padding: 25px;
transition: all 0.3s;
}

.roadmap-item.done .roadmap-content {
border-color: rgba(0, 255, 204, 0.3);
}

.roadmap-item.active .roadmap-content {
border-color: var(--primary);
box-shadow: 0 0 30px rgba(123, 47, 255, 0.15);
}

.roadmap-content:hover {
transform: translateX(5px);
}

.roadmap-phase {
font-family: 'Orbitron', monospace;
font-size: 0.8rem;
color: var(--secondary);
margin-bottom: 5px;
}

.roadmap-title {
font-family: 'Orbitron', monospace;
font-size: 1.2rem;
margin-bottom: 12px;
}

.roadmap-items {
list-style: none;
}

.roadmap-items li {
color: rgba(255,255,255,0.7);
padding: 4px 0;
font-size: 0.95rem;
}

.roadmap-items li::before {
content: '→ ';
color: var(--secondary);
}

.roadmap-item.done .roadmap-items li::before {
content: '✓ ';
}

.roadmap-status {
display: inline-block;
font-family: 'Orbitron', monospace;
font-size: 0.7rem;
padding: 3px 10px;
border-radius: 10px;
margin-top: 10px;
}

.status-done {
background: rgba(0, 255, 204, 0.15);
color: var(--secondary);
border: 1px solid rgba(0, 255, 204, 0.3);
}

.status-active {
background: rgba(123, 47, 255, 0.2);
color: #a855f7;
border: 1px solid rgba(123, 47, 255, 0.4);
animation: btnPulse 2s infinite;
}

.status-upcoming {
background: rgba(255,255,255,0.05);
color: rgba(255,255,255,0.5);
border: 1px solid rgba(255,255,255,0.1);
}

/* HOW TO BUY */
.steps-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap: 25px;
}

.step-card {
background: rgba(123, 47, 255, 0.08);
border: 1px solid rgba(123, 47, 255, 0.25);
border-radius: 20px;
padding: 30px 20px;
text-align: center;
transition: all 0.4s;
position: relative;
}

.step-card:hover {
transform: translateY(-5px);
border-color: var(--secondary);
}

.step-number {
font-family: 'Orbitron', monospace;
font-size: 3rem;
font-weight: 900;
color: var(--primary);
opacity: 0.3;
position: absolute;
top: 10px;
right: 20px;
}

.step-icon {
font-size: 2.5rem;
margin-bottom: 15px;
display: block;
}

.step-card h3 {
font-family: 'Orbitron', monospace;
font-size: 1rem;
color: var(--secondary);
margin-bottom: 10px;
}

.step-card p {
color: rgba(255,255,255,0.7);
font-size: 0.9rem;
line-height: 1.5;
}

/* GAME */
.game-section {
text-align: center;
}

.game-container {
background: rgba(123, 47, 255, 0.08);
border: 1px solid rgba(123, 47, 255, 0.25);
border-radius: 25px;
padding: 40px 30px;
max-width: 500px;
margin: 0 auto;
}

.game-score {
font-family: 'Orbitron', monospace;
font-size: 3rem;
font-weight: 900;
color: var(--secondary);
margin-bottom: 5px;
}

.game-level {
font-family: 'Orbitron', monospace;
font-size: 1rem;
color: var(--primary);
margin-bottom: 20px;
}

.game-mascot-btn {
width: 180px;
height: 180px;
border-radius: 50%;
border: 3px solid var(--primary);
cursor: pointer;
transition: transform 0.1s;
background: none;
padding: 0;
box-shadow: 0 0 30px var(--glow);
overflow: hidden;
position: relative;
display: inline-block;
}

.game-mascot-btn:active {
transform: scale(0.92);
}

.game-mascot-btn img {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 50%;
}

.game-instruction {
color: rgba(255,255,255,0.5);
margin-top: 15px;
font-size: 0.9rem;
}

.game-multiplier {
font-family: 'Orbitron', monospace;
color: var(--secondary);
font-size: 0.85rem;
margin-top: 8px;
}

.float-text {
position: absolute;
pointer-events: none;
font-family: 'Orbitron', monospace;
font-weight: 900;
font-size: 1.5rem;
color: var(--secondary);
animation: floatUp 1s ease-out forwards;
z-index: 100;
}

@keyframes floatUp {
0% { opacity: 1; transform: translateY(0) scale(1); }
100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
}

/* COMMUNITY */
.community-grid {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;
}

.community-card {
background: rgba(123, 47, 255, 0.08);
border: 1px solid rgba(123, 47, 255, 0.25);
border-radius: 20px;
padding: 30px 40px;
text-align: center;
transition: all 0.4s;
text-decoration: none;
color: white;
min-width: 200px;
}

.community-card:hover {
transform: translateY(-8px);
border-color: var(--secondary);
box-shadow: 0 15px 50px rgba(0, 255, 204, 0.12);
}

.community-icon {
font-size: 3rem;
margin-bottom: 15px;
display: block;
}

.community-card h3 {
font-family: 'Orbitron', monospace;
font-size: 1rem;
color: var(--secondary);
margin-bottom: 5px;
}

.community-card p {
color: rgba(255,255,255,0.6);
font-size: 0.85rem;
}

/* FOOTER */
footer {
border-top: 1px solid rgba(123, 47, 255, 0.2);
padding: 40px 20px;
text-align: center;
max-width: 1200px;
margin: 0 auto;
}

.footer-logo {
font-family: 'Orbitron', monospace;
font-size: 1.5rem;
font-weight: 900;
background: linear-gradient(90deg, var(--primary), var(--secondary));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 15px;
}

.footer-disclaimer {
color: rgba(255,255,255,0.4);
font-size: 0.8rem;
line-height: 1.6;
max-width: 600px;
margin: 0 auto;
}

/* Explosion particles */
.explosion-particle {
position: fixed;
pointer-events: none;
border-radius: 50%;
z-index: 9998;
animation: particleFade 0.8s ease-out forwards;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-start); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

/* Mobile */
@media (max-width: 768px) {
.nav-links a:not(.btn-buy) { display: none; }
.hero h1 { font-size: 2.5rem; }
.mascot { width: 180px; height: 180px; }
.tokenomics-container { flex-direction: column; }
.token-chart { width: 220px; height: 220px; }
.token-chart::after { width: 110px; height: 110px; font-size: 0.75rem; }
.hero-buttons { flex-direction: column; align-items: center; }
.roadmap-timeline::before { left: 20px; }
.roadmap-item { padding-left: 55px; }
.roadmap-dot { left: 10px; }
}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<!-- NAVBAR -->
<nav>
<div class="nav-container">
<div class="nav-logo">🚀 $TOKEN</div>
<div class="nav-links">
<a href="#about">About</a>
<a href="#tokenomics">Tokenomics</a>
<a href="#roadmap">Roadmap</a>
<a href="#game">Game</a>
<a href="#" class="btn-buy" onclick="triggerExplosion(event)">Buy Now</a>
</div>
</div>
</nav>

<!-- HERO -->
