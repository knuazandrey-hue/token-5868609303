<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniKat $UKAT — One horn. No rules. Pure chaos.</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
--primary: #ff2d95;
--secondary: #00ffcc;
--bg-start: #0a0a0a;
--bg-end: #1a1a2e;
--glow: rgba(255, 45, 149, 0.8);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
min-height: 100vh;
font-family: 'Inter', sans-serif;
color: #fff;
overflow-x: hidden;
cursor: none;
}
#cursor {
position: fixed;
width: 20px; height: 20px;
border: 2px solid var(--primary);
border-radius: 50%;
pointer-events: none;
z-index: 99999;
transform: translate(-50%,-50%);
transition: width .2s, height .2s;
box-shadow: 0 0 10px var(--glow);
}
#cursor-trail {
position: fixed;
width: 8px; height: 8px;
background: var(--secondary);
border-radius: 50%;
pointer-events: none;
z-index: 99998;
transform: translate(-50%,-50%);
transition: left .1s, top .1s;
}
canvas#particles {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: 0;
pointer-events: none;
}
#doodle-elements {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 1;
overflow: hidden;
}
.doodle-spark {
position: absolute;
pointer-events: none;
font-size: 20px;
animation: sparkFly .8s forwards;
}
@keyframes sparkFly {
0% { opacity: 1; transform: scale(1) translate(0,0); }
100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
}
@keyframes float {
0%,100% { transform: translateY(0) rotate(-2deg); }
50% { transform: translateY(-20px) rotate(2deg); }
}
@keyframes textGlow {
0%,100% { text-shadow: 0 0 20px var(--glow); }
50% { text-shadow: 0 0 60px var(--glow), 0 0 100px var(--glow); }
}
@keyframes fadeInUp {
from { opacity: 0; transform: translateY(40px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes btnPulse {
0%,100% { box-shadow: 0 0 20px var(--glow); }
50% { box-shadow: 0 0 50px var(--glow), 0 0 100px var(--glow); }
}
@keyframes explosive {
0% { transform: scale(1) rotate(0deg); }
25% { transform: scale(1.3) rotate(5deg); }
50% { transform: scale(0.9) rotate(-3deg); }
75% { transform: scale(1.1) rotate(2deg); }
100% { transform: scale(1) rotate(0deg); }
}
@keyframes drawLine {
from { stroke-dashoffset: 1000; }
to { stroke-dashoffset: 0; }
}
@keyframes sketchIn {
from { opacity: 0; stroke-dashoffset: 500; }
to { opacity: 1; stroke-dashoffset: 0; }
}
@keyframes neonFlicker {
0%,95%,100% { opacity: 1; }
97% { opacity: 0.3; }
}
@keyframes scrollMascot {
0% { transform: rotate(-5deg) scale(1); }
50% { transform: rotate(5deg) scale(1.05); }
100% { transform: rotate(-5deg) scale(1); }
}
@keyframes plusOne {
0% { opacity: 1; transform: translateY(0) scale(1); }
100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
}
@keyframes roadmapPulse {
0%,100% { box-shadow: 0 0 10px var(--primary); }
50% { box-shadow: 0 0 30px var(--primary), 0 0 60px var(--primary); }
}
@keyframes coinSpin {
0% { transform: rotateY(0deg); }
100% { transform: rotateY(360deg); }
}
@keyframes dash-anim {
to { stroke-dashoffset: 0; }
}
nav {
position: fixed; top: 0; left: 0; right: 0;
z-index: 1000;
padding: 15px 40px;
display: flex; justify-content: space-between; align-items: center;
backdrop-filter: blur(20px);
background: rgba(10,10,10,0.7);
border-bottom: 1px solid rgba(255,45,149,0.3);
}
.nav-logo {
font-family: 'Permanent Marker', cursive;
font-size: 28px;
color: var(--primary);
animation: textGlow 2s infinite;
text-shadow: 0 0 20px var(--glow);
}
.nav-links { display: flex; gap: 20px; align-items: center; }
.nav-links a {
color: #fff;
text-decoration: none;
font-weight: 600;
font-size: 14px;
transition: color .3s;
}
.nav-links a:hover { color: var(--primary); }
.btn-primary {
background: linear-gradient(135deg, var(--primary), #ff6b35);
border: none;
padding: 12px 28px;
border-radius: 50px;
color: #fff;
font-weight: 700;
font-size: 14px;
cursor: pointer;
animation: btnPulse 2s infinite;
transition: transform .2s;
text-decoration: none;
display: inline-block;
font-family: 'Permanent Marker', cursive;
letter-spacing: 1px;
}
.btn-primary:hover { transform: scale(1.05) rotate(-1deg); }
.btn-secondary {
background: transparent;
border: 2px solid var(--secondary);
padding: 12px 28px;
border-radius: 50px;
color: var(--secondary);
font-weight: 700;
font-size: 14px;
cursor: pointer;
transition: all .3s;
text-decoration: none;
display: inline-block;
font-family: 'Permanent Marker', cursive;
}
.btn-secondary:hover {
background: var(--secondary);
color: #000;
}
section { position: relative; z-index: 2; }
#hero {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 120px 20px 60px;
position: relative;
}
.hero-sketch-border {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
overflow: hidden;
}
.mascot-wrapper {
position: relative;
display: inline-block;
margin-bottom: 20px;
}
.mascot {
width: 280px;
height: 280px;
border-radius: 50%;
animation: float 3s ease-in-out infinite;
object-fit: cover;
border: 4px solid var(--primary);
box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(255,45,149,0.4);
filter: contrast(1.1) saturate(1.2);
}
.mascot-scroll {
position: fixed;
right: 30px;
top: 50%;
transform: translateY(-50%);
z-index: 100;
width: 80px;
height: 80px;
border-radius: 50%;
object-fit: cover;
border: 3px solid var(--primary);
box-shadow: 0 0 20px var(--glow);
animation: scrollMascot 2s ease-in-out infinite;
cursor: pointer;
transition: transform .3s;
}
.mascot-scroll:hover { transform: translateY(-50%) scale(1.2) rotate(15deg); }
.hero-tag {
background: rgba(255,45,149,0.2);
border: 1px solid var(--primary);
border-radius: 50px;
padding: 6px 20px;
font-size: 13px;
color: var(--primary);
margin-bottom: 20px;
display: inline-block;
font-family: 'Permanent Marker', cursive;
letter-spacing: 2px;
}
h1.hero-title {
font-family: 'Permanent Marker', cursive;
font-size: clamp(40px, 8vw, 80px);
background: linear-gradient(135deg, var(--primary), var(--secondary), #fff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: textGlow 2s infinite;
line-height: 1.1;
margin-bottom: 15px;
}
.hero-slogan {
font-size: clamp(16px, 2.5vw, 22px);
color: rgba(255,255,255,0.8);
min-height: 30px;
margin-bottom: 30px;
font-family: 'Permanent Marker', cursive;
}
.hero-ca {
background: rgba(255,255,255,0.05);
border: 1px dashed rgba(255,255,255,0.3);
border-radius: 12px;
padding: 12px 24px;
margin: 20px auto;
max-width: 400px;
display: flex;
align-items: center;
gap: 15px;
cursor: pointer;
transition: all .3s;
}
.hero-ca:hover {
border-color: var(--primary);
background: rgba(255,45,149,0.1);
}
.ca-text { font-size: 13px; color: rgba(255,255,255,0.6); word-break: break-all; }
.ca-copy { color: var(--primary); font-size: 12px; font-weight: 700; white-space: nowrap; }
.copy-toast {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
background: var(--primary);
color: #fff;
padding: 12px 24px;
border-radius: 50px;
font-weight: 700;
z-index: 9999;
opacity: 0;
transition: opacity .3s;
pointer-events: none;
font-family: 'Permanent Marker', cursive;
}
.copy-toast.show { opacity: 1; }
.hero-btns { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
.sketch-lightning {
position: absolute;
pointer-events: none;
animation: neonFlicker 3s infinite;
}
.stats-section {
padding: 80px 20px;
max-width: 1200px;
margin: 0 auto;
}
.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 24px;
}
.stat-card {
background: rgba(255,255,255,0.03);
backdrop-filter: blur(20px);
border: 1px solid rgba(255,45,149,0.3);
border-radius: 20px;
padding: 30px;
text-align: center;
position: relative;
overflow: hidden;
transition: transform .3s;
}
.stat-card::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, var(--primary), transparent);
}
.stat-card:hover { transform: translateY(-5px); }
.stat-card .stat-icon { font-size: 36px; margin-bottom: 12px; }
.stat-card .stat-num {
font-family: 'Permanent Marker', cursive;
font-size: 36px;
color: var(--primary);
animation: textGlow 2s infinite;
}
.stat-card .stat-label { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 5px; }
.section-title {
font-family: 'Permanent Marker', cursive;
font-size: clamp(30px, 5vw, 48px);
text-align: center;
margin-bottom: 60px;
color: #fff;
position: relative;
animation: textGlow 3s infinite;
}
.section-title span { color: var(--primary); }
.section-title::after {
content: '';
display: block;
width: 80px;
height: 3px;
background: linear-gradient(90deg, var(--primary), var(--secondary));
margin: 15px auto 0;
border-radius: 2px;
}
.about-section {
padding: 80px 20px;
max-width: 1200px;
margin: 0 auto;
}
.about-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 24px;
}
.about-card {
background: rgba(255,255,255,0.02);
border: 1px solid rgba(0,255,204,0.2);
border-radius: 20px;
padding: 30px;
position: relative;
overflow: hidden;
transition: all .3s;
}
.about-card::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(255,45,149,0.05), rgba(0,255,204,0.05));
opacity: 0;
transition: opacity .3s;
}
.about-card:hover::before { opacity: 1; }
.about-card:hover { transform: translateY(-5px) rotate(0.5deg); border-color: var(--primary); }
.about-icon { font-size: 48px; margin-bottom: 16px; display: block; }
.about-card h3 {
font-family: 'Permanent Marker', cursive;
font-size: 22px;
color: var(--primary);
margin-bottom: 12px;
}
.about-card p { color: rgba(255,255,255,0.7); line-height: 1.7; font-size: 15px; }
.tokenomics-section {
padding: 80px 20px;
max-width: 1200px;
margin: 0 auto;
}
.tokenomics-inner {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 60px;
align-items: center;
}
@media (max-width: 768px) {
.tokenomics-inner { grid-template-columns: 1fr; }
.nav-links { display: none; }
}
.pie-chart-wrapper {
display: flex;
justify-content: center;
align-items: center;
position: relative;
}
.pie-chart {
width: 280px;
height: 280px;
border-radius: 50%;
background: conic-gradient(
var(--primary) 0deg 180deg,
var(--secondary) 180deg 252deg,
#ff6b35 252deg 306deg,
#9945ff 306deg 342deg,
rgba(255,255,255,0.3) 342deg 360deg
);
box-shadow: 0 0 40px var(--glow);
position: relative;
animation: explosive 4s ease-in-out infinite;
}
.pie-center {
position: absolute;
width: 120px;
height: 120px;
background: var(--bg-start);
border-radius: 50%;
top: 50%; left: 50%;
transform: translate(-50%,-50%);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
border: 2px solid var(--primary);
}
.pie-center span:first-child {
font-family: 'Permanent Marker', cursive;
color: var(--primary);
font-size: 14px;
}
.pie-center span:last-child { font-size: 11px; color: rgba(255,255,255,0.5); }
.toko-list { list-style: none; }
.toko-list li {
display: flex;
align-items: center;
gap: 15px;
padding: 12px 0;
border-bottom: 1px solid rgba(255,255,255,0.05);
font-size: 15px;
}
.toko-dot {
width: 14px; height: 14px;
border-radius: 50%;
flex-shrink: 0;
}
.toko-list li span:last-child {
margin-left: auto;
font-weight: 700;
color: var(--primary);
font-family: 'Permanent Marker', cursive;
}
.roadmap-section {
padding: 80px 20px;
max-width: 1200px;
margin: 0 auto;
}
.roadmap-timeline {
position: relative;
padding-left: 40px;
}
.roadmap-timeline::before {
content: '';
position: absolute;
left: 14px; top: 0; bottom: 0;
width: 2px;
background: linear-gradient(180deg, var(--primary), var(--secondary));
}
.roadmap-item {
position: relative;
margin-bottom: 40px;
padding: 24px;
border-radius: 16px;
background: rgba(255,255,255,0.02);
border: 1px solid rgba(255,45,149,0.15);
transition: all .3s;
}
.roadmap-item:hover { transform: translateX(5px); border-color: var(--primary); }
.roadmap-item::before {
content: '';
position: absolute;
left: -33px; top: 28px;
width: 16px; height: 16px;
border-radius: 50%;
border: 2px solid var(--primary);
background: var(--bg-start);
}
.roadmap-item.done::before { background: var(--secondary); border-color: var(--secondary); }
.roadmap-item.active::before {
background: var(--primary);
animation: roadmapPulse 1.5s infinite;
}
.phase-badge {
display: inline-block;
padding: 4px 14px;
border-radius: 50px;
font-size: 12px;
font-weight: 700;
margin-bottom: 8px;
font-family: 'Permanent Marker', cursive;
}
.done .phase-badge { background: rgba(0,255,204,0.2); color: var(--secondary); border: 1px solid var(--secondary); }
.active .phase-badge { background: rgba(255,45,149,0.2); color: var(--primary); border: 1px solid var(--primary); animation: btnPulse 2s infinite; }
.upcoming .phase-badge { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.2); }
.roadmap-item h3 {
font-family: 'Permanent Marker', cursive;
font-size: 20px;
color: #fff;
margin-bottom: 12px;
}
.roadmap-item ul { list-style: none; }
.roadmap-item ul li {
color: rgba(255,255,255,0.7);
font-size: 14px;
padding: 4px 0;
display: flex;
align-items: center;
gap: 8px;
}
.roadmap-item ul li::before { content: '→'; color: var(--primary); }
.done .roadmap-item ul li::before,
.roadmap-item.done ul li::before { content: '✓'; color: var(--secondary); }
.htb-section {
padding: 80px 20px;
max-width: 1200px;
margin: 0 auto;
}
.htb-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 24px;
}
.htb-step {
background: rgba(255,255,255,0.02);
border: 1px solid rgba(255,45,149,0.2);
border-radius: 20px;
padding: 30px 20px;
text-align: center;
transition: all .3s;
position: relative;
overflow: hidden;
}
.htb-step:hover { transform: translateY(-8px) rotate(1deg); border-color: var(--secondary); }
.htb-num {
font-family: 'Permanent Marker', cursive;
font-size: 52px;
color: rgba(255,45,149,0.2);
line-height: 1;
margin-bottom: 10px;
}
.htb-step h3 {
font-family: 'Permanent Marker', cursive;
color: var(--primary);
font-size: 18px;
margin-bottom: 10px;
}
.htb-step p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; }
.game-section {
padding: 80px 20px;
max-width: 1200px;
margin: 0 auto;
}
.clicker-wrapper {
display: flex;
flex-direction: column;
align-items: center;
gap: 20px;
}
.clicker-mascot-wrap {
position: relative;
cursor: pointer;
display: inline-block;
}
.clicker-mascot {
width: 200px;
height: 200px;
border-radius: 50%;
object-fit: cover;
border: 4px solid var(--primary);
box-shadow: 0 0 30px var(--glow);
transition: transform .1s;
}
.clicker-mascot:active { transform: scale(0.9); }
.clicker-score {
font-family: 'Permanent Marker', cursive;
font-size: 48px;
color: var(--primary);
animation: textGlow 2s infinite;
}
.clicker-label { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: -10px; }
.clicker-level {
background: rgba(255,45,149,0.1);
border: 1px solid var(--primary);
border-radius: 50px;
padding: 8px 24px;
font-family: 'Permanent Marker', cursive;
color: var(--primary);
font-size: 16px;
}
.plus-one {
position: absolute;
font-family: 'Permanent Marker', cursive;
font-size: 28px;
color: var(--secondary);
pointer-events: none;
animation: plusOne .8s forwards;
text-shadow: 0 0 10px var(--secondary);
top: 50%; left: 50%;
transform: translate(-50%, -50%);
z-index: 10;
}
.game-tabs {
display: flex;
gap: 10px;
margin-bottom: 20px;
}
.game-tab {
padding: 10px 24px;
border-radius: 50px;
border: 1px solid rgba(255,45,149,0.4);
background: transparent;
color: rgba(255,255,255,0.6);
cursor: pointer;
font-family: 'Permanent Marker', cursive;
font-size: 14px;
transition: all .3s;
}
.game-tab.active, .game-tab:hover {
background: var(--primary);
color: #fff;
border-color: var(--primary);
}
#doodle-dash-canvas {
border: 2px solid var(--primary);
border-radius: 16px;
box-shadow: 0 0 30px var(--glow);
display: block;
margin: 0 auto;
cursor: crosshair;
}
.game-controls {
display: flex;
gap: 10px;
flex-wrap: wrap;
justify-content: center;
margin-top: 10px;
}
.leaderboard {
background: rgba(255,255,255,0.03);
border: 1px solid rgba(255,45,149,0.2);
border-radius: 16px;
padding: 20px;
min-width: 250px;
}
.leaderboard h4 {
font-family: 'Permanent Marker', cursive;
color: var(--primary);
margin-bottom: 15px;
font-size: 18px;
}
.lb-entry {
display: flex;
justify-content: space-between;
padding: 6px 0;
border-bottom: 1px solid rgba(255,255,255,0.05);
font-size: 13px;
}
.lb-entry .rank { color: var(--primary); font-weight: 700; }
.lb-entry .score { color: var(--secondary); }
.game-area {
display: flex;
gap: 30px;
flex-wrap: wrap;
justify-content: center;
align-items: flex-start;
}
#game-score-dd {
font-family: 'Permanent Marker', cursive;
font-size: 20px;
color: var(--secondary);
text-align: center;
margin-top: 10px;
}
.community-section {
padding: 80px 20px;
max-width: 900px;
margin: 0 auto;
text-align: center;
}
.community-grid {
display: flex;
gap: 20px;
justify-content: center;
flex-wrap: wrap;
margin-top: 40px;
}
.comm-card {
background: rgba(255,255,255,0.03);
border: 2px solid rgba(255,45,149,0.3);
border-radius: 20px;
padding: 30px 40px;
text-decoration: none;
color: #fff;
transition: all .3s;
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
min-width: 160px;
}
.comm-card:hover {
transform: translateY(-10px) rotate(-2deg);
border-color: var(--primary);
box-shadow: 0 10px 40px var(--glow);
}
.comm-icon { font-size: 48px; }
.comm-name {
font-family: 'Permanent Marker', cursive;
font-size: 18px;
color: var(--primary);
}
.comm-desc { font-size: 13px; color: rgba(255,255,255,0.5); }
footer {
background: rgba(0,0,0,0.5);
border-top: 1px solid rgba(255,45,149,0.2);
padding: 40px 20px;
text-align: center;
position: relative;
z-index: 2;
}
.footer-logo {
font-family: 'Permanent Marker', cursive;
font-size: 32px;
color: var(--primary);
animation: textGlow 2s infinite;
margin-bottom: 15px;
}
.footer-links {
display: flex;
gap: 20px;
justify-content: center;
margin-bottom: 20px;
flex-wrap: wrap;
}
.footer-links a {
color: rgba(255,255,255,0.5);
text-decoration: none;
font-size: 14px;
transition: color .3s;
}
.footer-links a:hover { color: var(--primary); }
.disclaimer {
font-size: 12px;
color: rgba(255,255,255,0.3);
max-width: 600px;
margin: 0 auto;
line-height: 1.6;
}
.sketch-frame {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
}
.neon-line {
stroke-dasharray: 1000;
stroke-dashoffset: 1000;
animation: dash-anim 2s forwards;
}
.doodle-bg-element {
position: absolute;
pointer-events: none;
opacity: 0.1;
animation: float 4s ease-in-out infinite;
font-size: 40px;
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="particles"></canvas>
